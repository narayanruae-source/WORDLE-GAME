    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121213;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #3a3a3c;
            padding: 12px 0;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Toast notification */
        #toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: #ffffff;
            color: #121213;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
            animation: fadeIn 0.1s ease, fadeOut 0.3s ease 1.5s forwards;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Game board */
        #game-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0 10px;
            flex-grow: 1;
        }

        .board-row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .tile {
            width: 62px;
            height: 62px;
            border: 2px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
            transition: border-color 0.1s;
            user-select: none;
        }

        .tile.filled {
            border-color: #565758;
            animation: pop 0.07s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .tile.flip {
            animation: flipIn 0.3s ease forwards, flipOut 0.3s ease 0.3s forwards;
        }

        @keyframes flipIn {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(90deg); }
        }

        @keyframes flipOut {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        .tile.correct {
            background-color: #538d4e;
            border-color: #538d4e;
        }

        .tile.present {
            background-color: #b59f3b;
            border-color: #b59f3b;
        }

        .tile.absent {
            background-color: #3a3a3c;
            border-color: #3a3a3c;
        }

        /* Shake animation */
        .board-row.shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        /* Bounce animation for win */
        .tile.bounce {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        /* Keyboard */
        #keyboard {
            padding: 10px 8px 20px;
            width: 100%;
            max-width: 500px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .key {
            height: 58px;
            min-width: 43px;
            padding: 0;
            border: none;
            border-radius: 4px;
            background-color: #818384;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: background-color 0.2s;
            flex: 1;
            max-width: 43px;
        }

        .key:active {
            filter: brightness(0.8);
        }

        .key.wide {
            min-width: 65px;
            max-width: 65px;
            font-size: 0.75rem;
        }

        .key.correct {
            background-color: #538d4e;
        }

        .key.present {
            background-color: #b59f3b;
        }

        .key.absent {
            background-color: #3a3a3c;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a1b;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .modal p {
            margin-bottom: 15px;
            color: #aaa;
        }

        .modal button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            background: #538d4e;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .modal button:hover {
            filter: brightness(1.1);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .tile {
                width: 52px;
                height: 52px;
                font-size: 1.6rem;
            }
            .key {
                height: 50px;
                min-width: 32px;
                max-width: 32px;
                font-size: 0.8rem;
            }
            .key.wide {
                min-width: 50px;
                max-width: 50px;
            }
        }
    </style>
</head>

        EXTRA_GUESSES.forEach(w => VALID_WORDS.add(w.toLowerCase()));

        // ==================== GAME STATE ====================
        const WORD_LENGTH = 5;
        const MAX_GUESSES = 6;

        let currentRow = 0;
        let currentTile = 0;
        let gameOver = false;
        let isSubmitting = false;
        let secretWord = '';
        let board = []; // 2D array of letters
        let guessHistory = []; // Array of guesses

        // ==================== INITIALIZATION ====================
        function initGame() {
            currentRow = 0;
            currentTile = 0;
            gameOver = false;
            board = [];
            guessHistory = [];

            // Pick random word
            secretWord = ANSWERS[Math.floor(Math.random() * ANSWERS.length)].toLowerCase();
            console.log('Secret word:', secretWord); // For debugging

            // Initialize board
            for (let r = 0; r < MAX_GUESSES; r++) {
                board[r] = [];
                for (let c = 0; c < WORD_LENGTH; c++) {
                    board[r][c] = '';
                }
            }

            createBoard();
            createKeyboard();
            resetKeyboardColors();
            document.getElementById('modal').classList.remove('active');
        }

        function createBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';

            for (let r = 0; r < MAX_GUESSES; r++) {
                const rowEl = document.createElement('div');
                rowEl.classList.add('board-row');
                rowEl.id = `row-${r}`;

                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tileEl = document.createElement('div');
                    tileEl.classList.add('tile');
                    tileEl.id = `tile-${r}-${c}`;
                    rowEl.appendChild(tileEl);
                }

                boardEl.appendChild(rowEl);
            }
        }

        function createKeyboard() {
            const keyboardEl = document.getElementById('keyboard');
            keyboardEl.innerHTML = '';

            const rows = [
                ['q','w','e','r','t','y','u','i','o','p'],
                ['a','s','d','f','g','h','j','k','l'],
                ['Enter','z','x','c','v','b','n','m','⌫']
            ];

            rows.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.classList.add('keyboard-row');

                row.forEach(key => {
                    const keyEl = document.createElement('button');
                    keyEl.classList.add('key');
                    keyEl.textContent = key;
                    keyEl.id = `key-${key.toLowerCase()}`;

                    if (key === 'Enter' || key === '⌫') {
                        keyEl.classList.add('wide');
                    }

                    keyEl.addEventListener('click', () => handleKey(key));
                    rowEl.appendChild(keyEl);
                });

                keyboardEl.appendChild(rowEl);
            });
        }

        function resetKeyboardColors() {
            document.querySelectorAll('.key').forEach(key => {
                key.classList.remove('correct', 'present', 'absent');
            });
        }

        // ==================== INPUT HANDLING ====================
        function handleKey(key) {
            if (gameOver) return;

            if (key === 'Enter') {
                submitGuess();
            } else if (key === '⌫' || key === 'Backspace') {
                deleteLetter();
            } else if (/^[a-zA-Z]$/.test(key)) {
                addLetter(key.toLowerCase());
            }
        }

        function addLetter(letter) {
            if (currentTile >= WORD_LENGTH) return;

            board[currentRow][currentTile] = letter;
            const tileEl = document.getElementById(`tile-${currentRow}-${currentTile}`);
            tileEl.textContent = letter;
            tileEl.classList.add('filled');
            currentTile++;
        }

        function deleteLetter() {
            if (currentTile <= 0) return;

            currentTile--;
            board[currentRow][currentTile] = '';
            const tileEl = document.getElementById(`tile-${currentRow}-${currentTile}`);
            tileEl.textContent = '';
            tileEl.classList.remove('filled');
        }

        function submitGuess() {
            if (currentTile < WORD_LENGTH) {
                shakeRow(currentRow);
                showToast('Not enough letters');
                return;
            }

            const guess = board[currentRow].join('');

            if (!VALID_WORDS.has(guess)) {
                shakeRow(currentRow);
                showToast('Not in word list');
                return;
            }

            guessHistory.push(guess);
            revealRow(currentRow, guess);
        }

        // ==================== GAME LOGIC ====================
        function getLetterStates(guess) {
            const states = [];
            const secretLetters = secretWord.split('');
            const guessLetters = guess.split('');

            // Track which positions in secret are accounted for
            const secretAccounted = new Array(WORD_LENGTH).fill(false);

            // First pass: find correct (green)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessLetters[i] === secretLetters[i]) {
                    states[i] = 'correct';
                    secretAccounted[i] = true;
                }
            }

            // Second pass: find present (yellow) and absent (gray)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (states[i]) continue; // Already marked correct

                let found = false;
                for (let j = 0; j < WORD_LENGTH; j++) {
                    if (!secretAccounted[j] && guessLetters[i] === secretLetters[j]) {
                        states[i] = 'present';
                        secretAccounted[j] = true;
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    states[i] = 'absent';
                }
            }

            return states;
        }

        function revealRow(rowIndex, guess) {
            const states = getLetterStates(guess);

            // Animate each tile with a flip
            for (let i = 0; i < WORD_LENGTH; i++) {
                const tileEl = document.getElementById(`tile-${rowIndex}-${i}`);

                setTimeout(() => {
                    tileEl.classList.add('flip');

                    // Apply color midway through flip
                    setTimeout(() => {
                        tileEl.classList.add(states[i]);
                    }, 300);
                }, i * 250);
            }

            // After all flips complete
            setTimeout(() => {
                updateKeyboard(guess, states);

                const won = guess === secretWord;
                if (won) {
                    gameOver = true;
                    // Bounce animation
                    for (let i = 0; i < WORD_LENGTH; i++) {
                        setTimeout(() => {
                            const tileEl = document.getElementById(`tile-${rowIndex}-${i}`);
                            tileEl.classList.add('bounce');
                        }, i * 100);
                    }

                    const messages = ['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'];
                    showToast(messages[rowIndex] || 'Nice!');

                    setTimeout(() => {
                        showModal('🎉 You Won!', `The word was "${secretWord.toUpperCase()}"`);
                    }, 2000);

                } else if (rowIndex >= MAX_GUESSES - 1) {
                    gameOver = true;
                    showToast(secretWord.toUpperCase());
                    setTimeout(() => {
                        showModal('😔 Game Over', `The word was "${secretWord.toUpperCase()}"`);
                    }, 1500);
                } else {
                    currentRow++;
                    currentTile = 0;
                }
            }, WORD_LENGTH * 250 + 300);
        }

        function updateKeyboard(guess, states) {
            const priority = { 'correct': 3, 'present': 2, 'absent': 1 };

            for (let i = 0; i < WORD_LENGTH; i++) {
                const letter = guess[i];
                const state = states[i];
                const keyEl = document.getElementById(`key-${letter}`);

                if (!keyEl) continue;

                const currentClass = keyEl.classList.contains('correct') ? 'correct'
                    : keyEl.classList.contains('present') ? 'present'
                        : keyEl.classList.contains('absent') ? 'absent' : null;

                const currentPriority = currentClass ? priority[currentClass] : 0;
                const newPriority = priority[state];

                if (newPriority > currentPriority) {
                    keyEl.classList.remove('correct', 'present', 'absent');
                    keyEl.classList.add(state);
                }
            }
        }

        // ==================== ANIMATIONS & UI ====================
        function shakeRow(rowIndex) {
            const rowEl = document.getElementById(`row-${rowIndex}`);
            rowEl.classList.add('shake');
            setTimeout(() => rowEl.classList.remove('shake'), 500);
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.classList.add('toast');
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 2000);
        }

        function showModal(title, message) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').classList.add('active');
        }

        // ==================== KEYBOARD EVENTS ====================
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            if (e.key === 'Enter') {
                handleKey('Enter');
            } else if (e.key === 'Backspace') {
                handleKey('⌫');
            } else if (/^[a-zA-Z]$/.test(e.key)) {
                handleKey(e.key);
            }
        });

        document.getElementById('play-again-btn').addEventListener('click', () => {
            initGame();
        });

        initGame();
